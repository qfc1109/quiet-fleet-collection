server:
  port: 8081
  servlet:
    session:
      timeout: 24h
      cookie:
        max-age: 24h
        http-only: true
        same-site: lax

spring:
  application:
    name: quiet-fleet-collection
  redis:
    host: ${QFC_REDIS_HOST:localhost}
    port: ${QFC_REDIS_PORT:6379}
    password: ${QFC_REDIS_PASSWORD:}
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 2
  session:
    store-type: redis
    redis:
      namespace: qfc:http-session
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

qfc:
  datasource:
    site:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${QFC_MYSQL_HOST:localhost}:${QFC_MYSQL_PORT:3306}/qfc_site?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      username: ${QFC_MYSQL_USERNAME:root}
      password: ${QFC_MYSQL_PASSWORD:}
    site-log:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${QFC_MYSQL_HOST:localhost}:${QFC_MYSQL_PORT:3306}/qfc_site_log?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      username: ${QFC_MYSQL_USERNAME:root}
      password: ${QFC_MYSQL_PASSWORD:}
    admin:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${QFC_MYSQL_HOST:localhost}:${QFC_MYSQL_PORT:3306}/qfc_admin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      username: ${QFC_MYSQL_USERNAME:root}
      password: ${QFC_MYSQL_PASSWORD:}
    admin-log:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${QFC_MYSQL_HOST:localhost}:${QFC_MYSQL_PORT:3306}/qfc_admin_log?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      username: ${QFC_MYSQL_USERNAME:root}
      password: ${QFC_MYSQL_PASSWORD:}
  storage:
    root: ./storage
  auth:
    session-lifetime-seconds: 86400
    token:
      secret: ${QFC_JWT_SECRET:}
      access-token-expiry-seconds: 900
      refresh-token-expiry-seconds: 604800
